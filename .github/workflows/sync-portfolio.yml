name: Sync Portfolio from GitHub

# Enriches projects.json from the GitHub API and commits it back.
# Deployment is handled by Vercel (auto-deploys on push). No build secrets here.

on:
  push:
    branches: ["main"]
    paths:
      - "portfolio/projects.config.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run sync script
        env:
          # Built-in, scoped Actions token — NOT a personal secret, never exposed to clients.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync

      - name: Commit updated projects.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # No "[skip ci]" — this data commit SHOULD flow through the CI gate
          # (ci.yml) so it gets built + deployed. It changes src/data/projects.json,
          # not projects.config.json, so it will NOT re-trigger this sync (no loop).
          git diff --quiet src/data/projects.json || (
            git add src/data/projects.json &&
            git commit -m "chore: sync projects from GitHub" &&
            git push
          )
