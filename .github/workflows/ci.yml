name: CI & Deploy

# Runs the same checks Vercel runs (tsc -b && vite build) BEFORE anything is
# deployed, so a broken build is caught in CI instead of failing on Vercel.
# The deploy job only runs after `ci` succeeds — never in parallel.
# Test push: verifying Vercel Git auto-deploy is disabled (only the Action deploys).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Newer pushes to the same branch cancel older in-flight runs.
concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate: lint + typecheck + production build ────────────────────────────────
  ci:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        run: npm install

      # Lint is informational only (continue-on-error): Vercel does NOT run lint,
      # so it must never block a deploy. There are known pre-existing lint errors
      # in shadcn ui/ components. The build below is the real gate.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      # `npm run build` === `tsc -b && vite build` — IDENTICAL to Vercel's build,
      # so anything that would fail on Vercel fails here first and blocks deploy.
      - name: Typecheck & build
        run: npm run build

  # ── Deploy to Vercel (only if `ci` passed, only on push to main) ─────────────
  deploy:
    name: Deploy to Vercel
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Stays green (just warns) until the three Vercel secrets are configured,
      # so adding this workflow never turns the build red on its own.
      - name: Check Vercel secrets
        id: check
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel secrets not set — skipping deploy. Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in repo Settings → Secrets to enable gated deploys."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: steps.check.outputs.ready == 'true'
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        if: steps.check.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (Vercel)
        if: steps.check.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production
        if: steps.check.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
